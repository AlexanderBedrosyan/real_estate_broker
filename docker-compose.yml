version: "3.9"

services:
  db:
    image: postgres:14
    container_name: postgres_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data/
    networks:
      - app_net
    mem_limit: 256m
    memswap_limit: 384m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: django_app_2
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      VIRTUAL_HOST: stoyancherelov.com,www.stoyancherelov.com
    expose:
      - "8050"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - app_net
    mem_limit: 512m
    memswap_limit: 768m

  nginx-proxy:
    image: jwilder/nginx-proxy
    container_name: nginx_proxy
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    mem_limit: 128m
    memswap_limit: 192m
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./nginx/certs:/etc/nginx/certs:rw
      - ./nginx/vhost.d:/etc/nginx/vhost.d
      - ./nginx/html:/usr/share/nginx/html
      - media_volume:/app/media:ro
    networks:
      - app_net


volumes:
  pgdata:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  app_net:
    driver: bridge


